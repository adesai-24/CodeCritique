<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeCritique — AI Code Review</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Monaco Editor loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════════════ */
    :root {
      --bg:            #06060f;
      --glass-bg:      rgba(12, 12, 28, 0.55);
      --glass-border:  rgba(255, 255, 255, 0.09);
      --glass-shine:   rgba(255, 255, 255, 0.14);
      --glass-shadow:  0 24px 60px rgba(0, 0, 0, 0.55);
      --glass-blur:    blur(48px) saturate(200%);

      --text:          #f0f0ff;
      --text-2:        #8888aa;
      --text-3:        #5a5a7a;

      --accent:        #6366f1;
      --accent-2:      #8b5cf6;
      --accent-glow:   rgba(99, 102, 241, 0.35);

      --fatal:         #ef4444;
      --fatal-bg:      rgba(239, 68, 68, 0.12);
      --warning:       #f59e0b;
      --warning-bg:    rgba(245, 158, 11, 0.12);
      --info:          #3b82f6;
      --info-bg:       rgba(59, 130, 246, 0.12);
      --good:          #10b981;
      --good-bg:       rgba(16, 185, 129, 0.12);

      --radius-sm:     10px;
      --radius:        18px;
      --radius-lg:     28px;
      --radius-xl:     36px;

      --mono:          'JetBrains Mono', monospace;
      --sans:          'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ═══════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════════════════
       AURORA BACKGROUND
    ═══════════════════════════════════════════════════ */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      will-change: transform;
    }

    .blob-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.55) 0%, transparent 70%);
      top: -200px; left: -150px;
      animation: drift1 28s ease-in-out infinite;
    }
    .blob-2 {
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.45) 0%, transparent 70%);
      bottom: -150px; right: -100px;
      animation: drift2 24s ease-in-out infinite;
    }
    .blob-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.25) 0%, transparent 70%);
      top: 40%; left: 55%;
      animation: drift3 32s ease-in-out infinite;
    }
    .blob-4 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.3) 0%, transparent 70%);
      top: 25%; right: 20%;
      animation: drift4 20s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(60px,-80px) scale(1.08); }
      66%      { transform: translate(-40px,50px) scale(0.94); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%      { transform: translate(-70px,60px) scale(1.12); }
      70%      { transform: translate(50px,-40px) scale(0.9); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-60px,-60px) scale(1.15); }
    }
    @keyframes drift4 {
      0%,100% { transform: translate(0,0) scale(1); }
      45%      { transform: translate(40px,80px) scale(1.1); }
    }

    /* ═══════════════════════════════════════════════════
       GLASS MIXIN
    ═══════════════════════════════════════════════════ */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      box-shadow:
        var(--glass-shadow),
        inset 0 1px 0 var(--glass-shine);
    }

    /* ═══════════════════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════════════════ */
    .shell {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 16px;
      gap: 12px;
    }

    /* ── Navbar ── */
    .navbar {
      border-radius: var(--radius-lg);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .brand-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 14px;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .nav-pills {
      display: flex;
      gap: 6px;
    }

    .pill {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
      color: var(--text-2);
    }

    .pill:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text);
    }

    .pill.active {
      background: rgba(99, 102, 241, 0.18);
      border-color: rgba(99, 102, 241, 0.35);
      color: #a5b4fc;
    }

    .ai-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(16,185,129,0.25);
      background: rgba(16,185,129,0.1);
      color: #34d399;
    }

    .ai-badge.offline {
      border-color: rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text-3);
    }

    .ai-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #34d399;
    }

    .ai-badge.offline .ai-dot {
      background: var(--text-3);
    }

    /* ── Main panels ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
      min-height: 0;
    }

    .panel {
      border-radius: var(--radius-xl);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-2);
    }

    .panel-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── Editor panel ── */
    #editor-mount {
      width: 100%;
      height: 100%;
    }

    .editor-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 10px;
    }

    .lang-badge {
      font-size: 11px;
      font-weight: 600;
      font-family: var(--mono);
      color: var(--text-3);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      font-family: var(--sans);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      color: var(--text-2);
    }

    .btn-ghost:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text);
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
      min-width: 110px;
    }

    .btn-primary:hover {
      box-shadow: 0 6px 28px rgba(99,102,241,0.55);
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── Results panel ── */
    .results-scroll {
      overflow-y: auto;
      height: 100%;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .results-scroll::-webkit-scrollbar { width: 4px; }
    .results-scroll::-webkit-scrollbar-track { background: transparent; }
    .results-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 999px; }

    /* ── Empty / idle state ── */
    .idle-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 40px;
      color: var(--text-3);
    }

    .idle-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      display: grid;
      place-items: center;
      font-size: 24px;
      margin-bottom: 4px;
    }

    .idle-state h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-2);
    }

    .idle-state p {
      font-size: 12px;
      line-height: 1.6;
      max-width: 240px;
    }

    /* ── Progress ── */
    .progress-card {
      border-radius: var(--radius);
      padding: 16px 20px;
      background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.2);
    }

    .progress-label {
      font-size: 12px;
      font-weight: 500;
      color: #a5b4fc;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(165,180,252,0.3);
      border-top-color: #a5b4fc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .checker-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .checker-pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.25s ease;
    }

    .checker-pill.done {
      background: rgba(16,185,129,0.12);
      border-color: rgba(16,185,129,0.25);
      color: #34d399;
    }

    .checker-pill.running {
      background: rgba(99,102,241,0.15);
      border-color: rgba(99,102,241,0.3);
      color: #a5b4fc;
    }

    /* ── Summary card ── */
    .summary-card {
      border-radius: var(--radius);
      padding: 20px;
      background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1));
      border: 1px solid rgba(99,102,241,0.25);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .summary-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .summary-icon {
      font-size: 18px;
    }

    .summary-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a5b4fc;
    }

    .summary-text {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-chip {
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-chip.fatal  { background: var(--fatal-bg);   border: 1px solid rgba(239,68,68,0.2);  }
    .stat-chip.warn   { background: var(--warning-bg); border: 1px solid rgba(245,158,11,0.2); }
    .stat-chip.info   { background: var(--info-bg);    border: 1px solid rgba(59,130,246,0.2); }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-chip.fatal .stat-num  { color: var(--fatal);   }
    .stat-chip.warn  .stat-num  { color: var(--warning); }
    .stat-chip.info  .stat-num  { color: var(--info);    }

    .stat-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); }

    /* ── Section headers ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
    }

    .section-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .section-header h4 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .section-count {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
    }

    .section-fatal   .section-dot  { background: var(--fatal);   }
    .section-warning .section-dot  { background: var(--warning); }
    .section-info    .section-dot  { background: var(--info);    }
    .section-good    .section-dot  { background: var(--good);    }

    .section-fatal   h4 { color: var(--fatal);   }
    .section-warning h4 { color: var(--warning); }
    .section-info    h4 { color: var(--info);    }
    .section-good    h4 { color: var(--good);    }

    .section-fatal   .section-count { background: var(--fatal-bg);   color: var(--fatal);   }
    .section-warning .section-count { background: var(--warning-bg); color: var(--warning); }
    .section-info    .section-count { background: var(--info-bg);    color: var(--info);    }

    /* ── Issue cards ── */
    .issue-card {
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .issue-card:hover { transform: translateY(-1px); }

    .issue-card.fatal   { background: var(--fatal-bg);   border-color: rgba(239,68,68,0.2);  }
    .issue-card.warning { background: var(--warning-bg); border-color: rgba(245,158,11,0.2); }
    .issue-card.info    { background: var(--info-bg);    border-color: rgba(59,130,246,0.2); }

    .issue-card:hover.fatal   { border-color: rgba(239,68,68,0.45);  box-shadow: 0 8px 24px rgba(239,68,68,0.15);  }
    .issue-card:hover.warning { border-color: rgba(245,158,11,0.45); box-shadow: 0 8px 24px rgba(245,158,11,0.15); }
    .issue-card:hover.info    { border-color: rgba(59,130,246,0.45); box-shadow: 0 8px 24px rgba(59,130,246,0.15); }

    .issue-main {
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .issue-stripe {
      width: 3px;
      border-radius: 2px;
      flex-shrink: 0;
      align-self: stretch;
      min-height: 36px;
    }

    .fatal   .issue-stripe { background: var(--fatal);   }
    .warning .issue-stripe { background: var(--warning); }
    .info    .issue-stripe { background: var(--info);    }

    .issue-body { flex: 1; min-width: 0; }

    .issue-msg {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .issue-meta {
      display: flex;
      gap: 10px;
      font-size: 10.5px;
      font-family: var(--mono);
      color: var(--text-3);
    }

    .issue-expand {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }

    .issue-expand.open { max-height: 400px; }

    .issue-expand-inner {
      padding: 0 16px 14px 31px;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 12px;
    }

    .expand-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      margin-bottom: 6px;
    }

    .expand-text {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-2);
      margin-bottom: 10px;
    }

    .code-ctx {
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 11px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .code-line {
      display: flex;
      line-height: 1.7;
    }

    .code-line.highlight { background: rgba(239,68,68,0.12); }

    .line-num {
      min-width: 36px;
      padding: 0 8px 0 10px;
      color: var(--text-3);
      text-align: right;
      user-select: none;
      border-right: 1px solid rgba(255,255,255,0.05);
    }

    .line-num.hl { color: var(--fatal); }

    .line-code {
      padding: 0 10px;
      color: #c9d1d9;
      white-space: pre;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── What's Good ── */
    .good-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .good-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: #34d399;
      line-height: 1.5;
    }

    .good-bullet {
      flex-shrink: 0;
      width: 16px; height: 16px;
      background: var(--good-bg);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 9px;
      margin-top: 1px;
    }

    /* ── Pass banner ── */
    .pass-banner {
      border-radius: var(--radius);
      padding: 20px;
      background: var(--good-bg);
      border: 1px solid rgba(16,185,129,0.25);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .pass-icon {
      width: 40px; height: 40px;
      background: rgba(16,185,129,0.15);
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .pass-banner h4 { font-size: 14px; font-weight: 700; color: #34d399; margin-bottom: 2px; }
    .pass-banner p  { font-size: 12px; color: var(--good); opacity: 0.8; }

    /* ── Animations ── */
    .fade-in { animation: fadeIn 0.35s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Sample code picker ── */
    .sample-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: rgba(18,18,32,0.97);
      backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 6px;
      display: none;
      flex-direction: column;
      gap: 2px;
      z-index: 100;
      min-width: 200px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    .sample-menu.open { display: flex; }

    .sample-opt {
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-2);
      transition: all 0.15s;
    }

    .sample-opt:hover { background: rgba(255,255,255,0.06); color: var(--text); }

    .sample-wrap { position: relative; }

    /* scrollbar for monaco */
    .monaco-editor .scrollbar { opacity: 0.3; }
    .monaco-editor .scrollbar:hover { opacity: 1; }
  </style>
</head>
<body>

<!-- ───────── Aurora background ───────── -->
<div class="aurora" aria-hidden="true">
  <div class="aurora-blob blob-1"></div>
  <div class="aurora-blob blob-2"></div>
  <div class="aurora-blob blob-3"></div>
  <div class="aurora-blob blob-4"></div>
</div>

<!-- ───────── App shell ───────── -->
<div class="shell">

  <!-- Navbar -->
  <nav class="navbar glass">
    <div class="brand">
      <div class="brand-icon">⚡</div>
      CodeCritique
    </div>

    <div class="nav-pills">
      <button class="pill active" onclick="setMode('paste')">Paste Code</button>
      <button class="pill" onclick="window.open('https://github.com','_blank')">GitHub</button>
    </div>

<!-- ───────── App logic + Monaco setup ───────── -->
<script>
// ── Sample snippets (defined first — referenced by Monaco init below) ────────
var SAMPLE_CODE = {
  clean: `"""A well-written utility module."""
from typing import List


def calculate_average(numbers: List[float]) -> float:
    """Return the arithmetic mean of a list of numbers."""
    if not numbers:
        raise ValueError("Cannot calculate average of empty list")
    return sum(numbers) / len(numbers)


def is_palindrome(text: str) -> bool:
    """Return True if text reads the same forwards and backwards."""
    normalized = text.lower().replace(" ", "")
    return normalized == normalized[::-1]


def chunk_list(items: list, size: int) -> List[list]:
    """Split a list into chunks of at most 'size' elements."""
    if size <= 0:
        raise ValueError("Chunk size must be positive")
    return [items[i:i + size] for i in range(0, len(items), size)]
`,

  bugs: `"""Module with common logic bugs for demonstration."""
import os


def find_max(numbers):
    # BUG: initialises max to 0 — breaks for all-negative lists
    max_val = 0
    for n in numbers:
        if n > max_val:
            max_val = n
    return max_val


def count_words(text):
    words = text.split(" ")
    # BUG: off-by-one — misses the last word
    count = 0
    for i in range(len(words) - 1):
        count += 1
    return count


def get_config():
    # BUG: hardcoded secret
    API_KEY = "sk-prod-abc123supersecretkey"
    db_host = os.getenv("DB_HOST", "localhost")
    return {"key": API_KEY, "host": db_host}


def divide(a, b):
    # BUG: no zero-division guard
    return a / b
`,

  security: `"""Security anti-patterns."""
import subprocess
import sqlite3


def run_command(user_input):
    # CRITICAL: shell injection
    result = subprocess.run(user_input, shell=True, capture_output=True)
    return result.stdout


def get_user(username):
    conn = sqlite3.connect("users.db")
    cursor = conn.cursor()
    # CRITICAL: SQL injection
    query = f"SELECT * FROM users WHERE name = '{username}'"
    cursor.execute(query)
    return cursor.fetchone()


def save_password(username, password):
    # BAD: storing plaintext password
    with open("passwords.txt", "a") as f:
        f.write(f"{username}:{password}\\n")


SECRET_TOKEN = "ghp_realtoken1234567890abcdef"  # hardcoded secret
`,

  types: `"""Type annotation problems."""
from typing import Optional


def greet(name):
    return "Hello, " + name  # str + Any — mypy warning


def parse_age(value) -> int:
    # returns str or int depending on input — inconsistent
    if isinstance(value, str) and value.isdigit():
        return int(value)
    return value  # type: ignore


def concat(a: str, b: int) -> str:
    # BUG: concatenating str + int without conversion
    return a + b


class Config:
    port: int

    def __init__(self):
        self.port = "8080"   # assigned wrong type
`
};

// ── State ────────────────────────────────────────────────────────────────────
let running = false;
let currentSource = null;

// ── Health check ─────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch('/api/health');
    const data = await r.json();
    const badge = document.getElementById('ai-badge');
    const label = document.getElementById('ai-label');
    if (data.ai.anthropic) {
      badge.className = 'ai-badge';
      label.textContent = 'Anthropic AI';
    } else if (data.ai.ollama) {
      badge.className = 'ai-badge';
      label.textContent = 'Ollama AI';
    } else {
      badge.className = 'ai-badge offline';
      label.textContent = 'Static only';
    }
  } catch {
    const badge = document.getElementById('ai-badge');
    badge.className = 'ai-badge offline';
    document.getElementById('ai-label').textContent = 'Offline';
  }
}

checkHealth();

// ── Editor helpers ────────────────────────────────────────────────────────────
function clearEditor() {
  monacoEditor?.setValue('');
  resetResults();
}

function loadSample(key) {
  monacoEditor?.setValue(SAMPLE_CODE[key] || '');
  closeSamples();
  resetResults();
}

function toggleSamples() {
  document.getElementById('sampleMenu').classList.toggle('open');
}

function closeSamples() {
  document.getElementById('sampleMenu').classList.remove('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.sample-wrap')) closeSamples();
});

function setMode(mode) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
}

// ── Results helpers ───────────────────────────────────────────────────────────
function resetResults() {
  const r = document.getElementById('results');
  r.innerHTML = `
    <div class="idle-state" id="idle">
      <div class="idle-icon">🔍</div>
      <h3>Ready to review</h3>
      <p>Paste your Python code and hit <strong>Run Review</strong>.</p>
    </div>`;
  document.getElementById('result-meta').textContent = '';
}

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  return e;
}

// ── Main review flow ──────────────────────────────────────────────────────────
async function runReview() {
  if (running || !monacoEditor) return;
  const code = monacoEditor.getValue().trim();
  if (!code) return;

  running = true;
  document.getElementById('runBtn').disabled = true;

  // ── Build progress UI ────────────────────────────────────────────────
  const results = document.getElementById('results');
  results.innerHTML = '';

  const checkerNames = ['Lint (Ruff)', 'Security (Bandit)', 'Types (Mypy)'];
  const pillEls = {};

  const prog = el('div', 'progress-card fade-in');
  const lbl  = el('div', 'progress-label');
  const spin = el('div', 'spinner');
  const ltxt = document.createElement('span');
  ltxt.textContent = 'Starting analysis…';
  lbl.appendChild(spin); lbl.appendChild(ltxt);

  const pillsRow = el('div', 'checker-pills');
  checkerNames.forEach(n => {
    const p = el('span', 'checker-pill', n);
    pillEls[n] = p;
    pillsRow.appendChild(p);
  });

  prog.appendChild(lbl);
  prog.appendChild(pillsRow);
  results.appendChild(prog);

  // ── State accumulated during streaming ────────────────────────────────
  let issuesData  = [];
  let synthData   = null;
  let completeData = null;

  // ── Single SSE fetch (EventSource doesn't support POST) ───────────────
  try {
    const response = await fetch('/api/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, filename: 'main.py', language: 'python' }),
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const reader = response.body.getReader();
    const dec    = new TextDecoder();
    let buf      = '';
    let evtType  = 'message';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop(); // hold incomplete line

      for (const line of lines) {
        if (line.startsWith('event:')) {
          evtType = line.slice(6).trim();
        } else if (line.startsWith('data:')) {
          let data;
          try { data = JSON.parse(line.slice(5).trim()); } catch { continue; }

          switch (evtType) {
            case 'status':
              ltxt.textContent = data.message;
              break;
            case 'checker_done': {
              const p = pillEls[data.checker];
              if (p) { p.className = 'checker-pill done'; p.textContent = `✓ ${data.checker}`; }
              break;
            }
            case 'checker_error': {
              const p = pillEls[data.checker];
              if (p) { p.style.opacity = '0.35'; p.textContent = `✗ ${data.checker}`; }
              break;
            }
            case 'issues':
              issuesData = data;
              break;
            case 'synthesis':
              synthData = data;
              ltxt.textContent = 'AI synthesis complete ✓';
              break;
            case 'complete':
              completeData = data;
              break;
            case 'ai_error':
              ltxt.textContent = 'Static analysis complete (no AI)';
              break;
          }
          evtType = 'message';
        }
      }
    }
  } catch (err) {
    ltxt.textContent = `Error: ${err.message}`;
    running = false;
    document.getElementById('runBtn').disabled = false;
    return;
  }

  // ── Render final report ───────────────────────────────────────────────
  results.innerHTML = '';
  renderReport(results, issuesData, synthData, completeData);

  running = false;
  document.getElementById('runBtn').disabled = false;
}

// ── Report renderer ───────────────────────────────────────────────────────────
function renderReport(container, issues, synth, complete, code) {
  const fatal = issues.filter(i => i.severity === 'FATAL');
  const warnings = issues.filter(i => i.severity === 'WARNING');
  const infos = issues.filter(i => i.severity === 'INFO');

  // Meta
  if (complete) {
    document.getElementById('result-meta').textContent =
      `${complete.total} issue${complete.total !== 1 ? 's' : ''} · ${complete.passed ? '✓ No blockers' : '⚠ Fix required'}`;
  }

  // ── AI Summary ──────────────────────────────────────────────────────
  if (synth) {
    const card = el('div', 'summary-card fade-in');
    const top = el('div', 'summary-top');
    top.innerHTML = '<span class="summary-icon">✨</span>';
    const t = el('span', 'summary-title', 'AI Summary');
    top.appendChild(t);
    card.appendChild(top);
    const txt = el('p', 'summary-text');
    txt.textContent = synth.summary || 'Analysis complete.';
    card.appendChild(txt);
    container.appendChild(card);
  }

  // ── Stats ───────────────────────────────────────────────────────────
  if (issues.length > 0) {
    const row = el('div', 'stats-row fade-in');
    row.innerHTML = `
      <div class="stat-chip fatal"><span class="stat-num">${fatal.length}</span><span class="stat-lbl">Fatal</span></div>
      <div class="stat-chip warn"><span class="stat-num">${warnings.length}</span><span class="stat-lbl">Warnings</span></div>
      <div class="stat-chip info"><span class="stat-num">${infos.length}</span><span class="stat-lbl">Info</span></div>
    `;
    container.appendChild(row);
  }

  // ── Pass banner ─────────────────────────────────────────────────────
  if (issues.length === 0) {
    const banner = el('div', 'pass-banner fade-in');
    banner.innerHTML = `
      <div class="pass-icon">✅</div>
      <div>
        <h4>All Clear!</h4>
        <p>No issues found. Your code looks clean.</p>
      </div>`;
    container.appendChild(banner);
  }

  // ── Issue sections ───────────────────────────────────────────────────
  function renderSection(title, sectionClass, items) {
    if (!items.length) return;
    const wrap = el('div', 'fade-in', '');

    const hdr = el('div', `section-header section-${sectionClass}`);
    hdr.innerHTML = `
      <div class="section-dot"></div>
      <h4>${title}</h4>
      <span class="section-count">${items.length}</span>
    `;
    wrap.appendChild(hdr);

    items.forEach(issue => {
      const card = el('div', `issue-card ${issue.severity.toLowerCase()}`);

      const main = el('div', 'issue-main');
      const stripe = el('div', 'issue-stripe');
      const body = el('div', 'issue-body');

      const msg = el('div', 'issue-msg');
      msg.textContent = issue.message;

      const meta = el('div', 'issue-meta');
      meta.innerHTML = `
        <span>${escapeHtml(issue.file)} : ${issue.line}</span>
        <span>${issue.code}</span>
      `;

      body.appendChild(msg);
      body.appendChild(meta);
      main.appendChild(stripe);
      main.appendChild(body);
      card.appendChild(main);

      // Expandable details
      const expand = el('div', 'issue-expand');
      const inner = el('div', 'issue-expand-inner');

      if (issue.reasoning) {
        inner.appendChild(el('div', 'expand-label', 'Why this matters'));
        inner.appendChild(el('div', 'expand-text', escapeHtml(issue.reasoning)));
      }

      if (issue.suggested_fix) {
        inner.appendChild(el('div', 'expand-label', 'Suggested fix'));
        inner.appendChild(el('div', 'expand-text', escapeHtml(issue.suggested_fix)));
      }

      if (issue.code_context && issue.code_context.length) {
        inner.appendChild(el('div', 'expand-label', 'Code context'));
        const codeBlock = el('div', 'code-ctx');
        issue.code_context.forEach((line, idx) => {
          const lineNum = (issue.context_start_line || 1) + idx;
          const isHL = lineNum === issue.line;
          const row = el('div', `code-line${isHL ? ' highlight' : ''}`);
          row.innerHTML = `
            <span class="line-num${isHL ? ' hl' : ''}">${lineNum}</span>
            <span class="line-code">${escapeHtml(line.replace(/\n$/, ''))}</span>
          `;
          codeBlock.appendChild(row);
        });
        inner.appendChild(codeBlock);
      }

      if (!issue.reasoning && !issue.suggested_fix && !issue.code_context?.length) {
        inner.appendChild(el('div', 'expand-text', 'No additional details available.'));
      }

      expand.appendChild(inner);
      card.appendChild(expand);

      card.addEventListener('click', () => {
        expand.classList.toggle('open');
      });

      wrap.appendChild(card);
    });

    container.appendChild(wrap);
  }

  renderSection('Critical — Must Fix', 'fatal', fatal);
  renderSection('Warnings — Should Fix', 'warning', warnings);
  renderSection('Info — Suggestions', 'info', infos);

  // ── What's Good ─────────────────────────────────────────────────────
  if (synth?.whats_good?.length) {
    const wrap = el('div', 'fade-in');
    const hdr = el('div', 'section-header section-good');
    hdr.innerHTML = `<div class="section-dot"></div><h4>What's Good</h4>`;
    wrap.appendChild(hdr);
    const list = el('div', 'good-list');
    synth.whats_good.forEach(item => {
      const row = el('div', 'good-item');
      row.innerHTML = `<span class="good-bullet">✓</span><span>${escapeHtml(item)}</span>`;
      list.appendChild(row);
    });
    wrap.appendChild(list);
    container.appendChild(wrap);
  }
}

function escapeHtml(text) {
  if (text == null) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
</script>
