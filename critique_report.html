
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeCritique Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e14;
            --sidebar-bg: rgba(255, 255, 255, 0.03);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #e0e0e0;
            --text-dim: #a0a0a0;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --fatal-red: #ef4444;
            --warning-yellow: #f59e0b;
            --info-blue: #3b82f6;
            --success-green: #10b981;
            --glass-border: rgba(255, 255, 255, 0.1);
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 350px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .sidebar-header {
            padding: 2rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .issue-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .issue-item {
            padding: 1rem;
            margin-bottom: 0.75rem;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .issue-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .issue-item.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--accent-purple);
        }

        .issue-item .severity-indicator {
            width: 4px;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
        }

        .sev-fatal { background-color: var(--fatal-red); }
        .sev-warning { background-color: var(--warning-yellow); }
        .sev-info { background-color: var(--info-blue); }

        .issue-item h3 {
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .issue-item p {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: var(--font-mono);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.05), transparent);
            padding: 3rem;
            overflow-y: auto;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .empty-state h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--success-green);
        }

        .issue-detail {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .issue-detail.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-header {
            margin-bottom: 2rem;
        }

        .detail-header .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .badge-fatal { background: rgba(239, 68, 68, 0.2); color: var(--fatal-red); border: 1px solid var(--fatal-red); }
        .badge-warning { background: rgba(245, 158, 11, 0.2); color: var(--warning-yellow); border: 1px solid var(--warning-yellow); }
        .badge-info { background: rgba(59, 130, 246, 0.2); color: var(--info-blue); border: 1px solid var(--info-blue); }

        .detail-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .detail-meta {
            display: flex;
            gap: 1.5rem;
            color: var(--text-dim);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .detail-section {
            margin-bottom: 2.5rem;
        }

        .detail-section h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .reasoning-box {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 1.5rem;
            border-radius: 12px;
            line-height: 1.6;
        }

        .code-snippet {
            background: #1a1b26;
            padding: 1.5rem;
            border-radius: 12px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            overflow-x: auto;
            border: 1px solid var(--glass-border);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>CodeCritique</h1>
        </div>
        <div class="issue-list" id="issueList">
            <!-- Issues injected here -->
        </div>
    </div>
    <main class="main-content" id="mainContent">
        <div class="empty-state" id="emptyState">
            <h2>Select an issue to see details</h2>
            <p>Choose from the list on the left.</p>
        </div>
        
        <div class="issue-detail" id="issueDetail">
            <div class="detail-header">
                <span id="detailBadge" class="badge">FATAL</span>
                <h2 id="detailTitle">Title</h2>
            </div>
            <div class="detail-meta">
                <span id="detailFile">file.py</span>
                <span id="detailLoc">Line 10, Col 5</span>
                <span id="detailCode">CODE001</span>
            </div>
            
            <div class="detail-section">
                <h4>Reasoning & Recommendation</h4>
                <div class="reasoning-box" id="detailReasoning">
                    Detailed explanation goes here.
                </div>
            </div>

            <div class="detail-section">
                <h4>Context</h4>
                <div class="code-snippet">
                    <pre><code id="detailCodeSnippet"># Code context not available in this view yet.</code></pre>
                </div>
            </div>
        </div>
    </main>

    <script>
        const issues = [{"severity": "WARNING", "file": "src\\critique\\checkers\\coverage.py", "line": 3, "column": 8, "message": "`os` imported but unused", "code": "F401", "reasoning": "Checking against coding standards."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\lint.py", "line": 38, "column": 29, "message": "Local variable `e` is assigned to but never used", "code": "F841", "reasoning": "Checking against coding standards."}, {"severity": "WARNING", "file": "src\\critique\\cli.py", "line": 3, "column": 31, "message": "`typing_extensions.Annotated` imported but unused", "code": "F401", "reasoning": "Checking against coding standards."}, {"severity": "WARNING", "file": "src\\critique\\runner.py", "line": 2, "column": 8, "message": "`os` imported but unused", "code": "F401", "reasoning": "Checking against coding standards."}, {"severity": "WARNING", "file": "src\\critique\\runner.py", "line": 22, "column": 12, "message": "Redefinition of unused `os` from line 2", "code": "F811", "reasoning": "Checking against coding standards."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\coverage.py", "line": 1, "column": 0, "message": "Consider possible security implications associated with the subprocess module.", "code": "B404", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\coverage.py", "line": 19, "column": 0, "message": "subprocess call - check for execution of untrusted input.", "code": "B603", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\coverage.py", "line": 47, "column": 0, "message": "Try, Except, Pass detected.", "code": "B110", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\lint.py", "line": 1, "column": 0, "message": "Consider possible security implications associated with the subprocess module.", "code": "B404", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\lint.py", "line": 17, "column": 0, "message": "subprocess call - check for execution of untrusted input.", "code": "B603", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\lint.py", "line": 38, "column": 0, "message": "Try, Except, Pass detected.", "code": "B110", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\security.py", "line": 1, "column": 0, "message": "Consider possible security implications associated with the subprocess module.", "code": "B404", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\security.py", "line": 17, "column": 0, "message": "subprocess call - check for execution of untrusted input.", "code": "B603", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\security.py", "line": 45, "column": 0, "message": "Try, Except, Pass detected.", "code": "B110", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\types.py", "line": 1, "column": 0, "message": "Consider possible security implications associated with the subprocess module.", "code": "B404", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\types.py", "line": 18, "column": 0, "message": "subprocess call - check for execution of untrusted input.", "code": "B603", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\checkers\\types.py", "line": 41, "column": 0, "message": "Try, Except, Pass detected.", "code": "B110", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\git_utils.py", "line": 3, "column": 0, "message": "Consider possible security implications associated with the subprocess module.", "code": "B404", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\git_utils.py", "line": 12, "column": 0, "message": "subprocess call - check for execution of untrusted input.", "code": "B603", "reasoning": "Security risk detected (LOW)."}, {"severity": "WARNING", "file": "src\\critique\\report.py", "line": 63, "column": 0, "message": "Try, Except, Pass detected.", "code": "B110", "reasoning": "Security risk detected (LOW)."}, {"severity": "FATAL", "file": "src\\critique\\runner.py", "line": 16, "column": 72, "message": "Incompatible default for argument \"custom_files\" (default has type \"None\", argument has type \"list[str]\")  [assignment]", "code": "TYPE", "reasoning": "Type mismatch found."}, {"severity": "FATAL", "file": "src\\critique\\cli.py", "line": 18, "column": 68, "message": "Argument \"custom_files\" to \"run_all_checks\" has incompatible type \"list[str] | None\"; expected \"list[str]\"  [arg-type]", "code": "TYPE", "reasoning": "Type mismatch found."}, {"severity": "INFO", "file": "PROJECT", "line": 0, "column": 0, "message": "No coverage data found. Run tests with coverage first.", "code": "COV001", "reasoning": "Coverage check requires .coverage data."}];
        const issueList = document.getElementById('issueList');
        const issueDetail = document.getElementById('issueDetail');
        const emptyState = document.getElementById('emptyState');

        function renderIssues() {
            if (issues.length === 0) return;

            issues.forEach((issue, index) => {
                const item = document.createElement('div');
                item.className = 'issue-item';
                item.innerHTML = `
                    <div class="severity-indicator sev-${issue.severity.toLowerCase()}"></div>
                    <h3>${issue.message}</h3>
                    <p>${issue.file.split(/[\\/]/).pop()}:${issue.line}</p>
                `;
                item.onclick = () => showIssue(index, item);
                issueList.appendChild(item);
            });
        }

        function showIssue(index, element) {
            const issue = issues[index];
            
            // UI Updates
            document.querySelectorAll('.issue-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            
            emptyState.style.display = 'none';
            issueDetail.classList.add('active');

            document.getElementById('detailBadge').className = `badge badge-${issue.severity.toLowerCase()}`;
            document.getElementById('detailBadge').innerText = issue.severity;
            document.getElementById('detailTitle').innerText = issue.message;
            document.getElementById('detailFile').innerText = issue.file;
            document.getElementById('detailLoc').innerText = `Line ${issue.line}${issue.column ? ', Col ' + issue.column : ''}`;
            document.getElementById('detailCode').innerText = issue.code;
            document.getElementById('detailReasoning').innerText = issue.reasoning || 'No specific reasoning provided.';
        }

        renderIssues();
    </script>
</body>
</html>
